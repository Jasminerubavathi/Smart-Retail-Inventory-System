<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
</head>
<body style="margin:0; font-family:Arial; background:linear-gradient(to right,#4e73df,#1cc88a);">

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <form id="loginForm" action="welcome.html" method="get"
          style="background:white; padding:40px; border-radius:10px; width:300px; text-align:center; box-shadow:0px 0px 15px rgba(0,0,0,0.2);">

        <h2 style="color:#4e73df;">Login</h2>

        <input type="text" name="username" placeholder="Enter Username" required
               style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;"><br>

        <input type="password" name="password" placeholder="Enter Password" required
               style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;"><br>

        <button type="submit"
                style="width:100%; padding:10px; background:#4e73df; color:white; border:none; border-radius:5px; cursor:pointer;">
            Login
        </button>

        <p id="errorMsg" style="color:red; display:none; margin-top:12px;"></p>

    </form>

</div>

</body>
</html>
